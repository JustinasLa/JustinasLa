name: README build
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 4 * * *"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Get Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Configure pip cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt
      - name: Update README file
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: |-
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "ACCESS_TOKEN secret not set; skipping stats update"
            exit 0
          fi
          python today.py
      - name: Commit
        run: |-
          git add .
          git diff
          git config --global user.email "github-actions-bot@users.noreply.github.com"
          git config --global user.name "JustinasLa/GitHub-Actions-Bot"
          if git commit -m "Updated README" -a; then
            git push
          else
            echo "No changes to commit"
          fi
